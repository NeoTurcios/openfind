name: Build OpenFind Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'openfind-core/**'
      - '.github/workflows/android.yml'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make Gradle Wrapper Executable
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: cd android && ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Stop Gradle Daemons
      if: always()
      run: cd android && ./gradlew --stop || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenFind-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenFind-Release-APK
        path: android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn
